name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Install npm dependencies
        run: npm ci || npm install

      - name: Build Web App
        run: npx tsc -b && npx vite build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Copy Muscle Assets
        run: |
          cp -r public/muscles android/app/src/main/assets/public/muscles
          echo "Muscles copied: $(ls android/app/src/main/assets/public/muscles | wc -l) files"
          du -sh android/app/src/main/assets/public/muscles

      - name: Make Gradle Wrapper Executable
        run: chmod +x ./android/gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.jks

      - name: Build Android APK
        working-directory: ./android
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniBody-Android-Release
          path: android/app/build/outputs/apk/release/app-release.apk